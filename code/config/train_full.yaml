dataset:
  root: "../../data"       # Path to your dataset root containing images, masks and descriptions.json (relative to this config)
  val_ratio: 0.1          # Fraction of the data to reserve for validation/test

model:
  sam_checkpoint: "../../checkpoints/sam_vit_h_4b8939.pth"  # Path to the SAM ViT‑H checkpoint.  Download from https://dl.fbaipublicfiles.com/segment_anything/sam_vit_h_4b8939.pth
  clip_model_name: "openai/clip-vit-base-patch16"         # HuggingFace id for the CLIP model
  llm_model_name: "lmsys/vicuna-7b-v1.5"                 # HuggingFace id for Vicuna
  lora_r: 16            # Rank of LoRA adapters【409945085282613†L540-L546】
  lora_alpha: 32        # Scaling factor for LoRA【409945085282613†L540-L546】

train:
  batch_size: 1           # Use small batch sizes due to the size of the models
  epochs: 5               # Number of training epochs
  lr: 1e-4                # Learning rate for LoRA parameters
  alpha: 1.0              # Weight for segmentation loss
  gamma: 1.0              # Weight for language loss
  seed: 42                # Random seed for reproducibility